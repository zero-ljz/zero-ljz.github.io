<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空心的个人主页 | Personal Dashboard</title>
    <link rel="icon" href="data:," />
    
    <!-- 预连接资源 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- 依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://gcore.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css" rel="stylesheet" />

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        glass: {
                            bg: 'rgba(30, 41, 59, 0.90)', // 更不透明的背景，防止文字重叠干扰
                            border: 'rgba(255, 255, 255, 0.08)',
                            hover: 'rgba(255, 255, 255, 0.08)'
                        }
                    },
                    zIndex: {
                        'menu': '9999',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: url('./img/bg.jpg') center/cover no-repeat fixed;
            background-color: #0f172a; /* 备用背景色 */
            color: #e2e8f0;
            text-shadow: 0 .05rem .1rem rgba(0, 0, 0, .5);
        }

        /* 滚动条美化 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
        
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 亚克力玻璃拟态 */
        .acrylic {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .acrylic-hover { transition: all 0.3s ease; }
        .acrylic-hover:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }


        .dynamic-menu-container {
            position: fixed; /* 使用 fixed 定位，避免滚动父级影响 */
            min-width: 220px;
            max-width: 300px; /* 限制最大宽度 */
            padding: 4px;
            border-radius: 0.75rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            /* 关键：限制最大高度，启用内部滚动 */
            max-height: calc(100vh - 20px); 
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* 菜单出现动画 */
        .animate-fade-in {
            animation: menuFadeIn 0.1s ease-out forwards;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body x-data="mainApp" class="overflow-x-hidden min-h-screen lg:pt-12 select-none" 
      @contextmenu.prevent="openContextMenu($event)"
      @click="closeContextMenu()">

    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-purple-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[-5%] w-[400px] h-[400px] bg-blue-600/20 rounded-full blur-[100px]"></div>
    </div>

    <!-- ===================== 顶部菜单栏 ===================== -->
<header class="hidden lg:flex fixed top-0 left-0 w-full h-12 acrylic z-50 items-center px-4 justify-between shadow-lg">
        <div class="flex items-center h-full">
            <div class="mr-6 font-bold text-white flex items-center gap-2">
                <i data-lucide="layout-grid" class="w-5 h-5 text-purple-400"></i>
                <span>Home Page</span>
            </div>
            
            <!-- 顶部菜单循环 -->
            <div class="flex h-full items-center gap-1">
                <template x-for="(item, index) in menuData" :key="index">
                    <div class="relative h-8 px-3 rounded-md flex items-center cursor-pointer hover:bg-white/10 transition-colors text-sm text-gray-300 hover:text-white group"
                         @mouseenter="handleTopMenuHover($event, item)"
                         @click="handleMenuClick(item)">
                        <!-- 顶级菜单图标 -->
                        <i x-show="item.icon" :data-lucide="item.icon" class="w-3.5 h-3.5 mr-2 opacity-70"></i>
                        <span x-text="item.label"></span>
                        <i x-show="item.children" data-lucide="chevron-down" class="w-3 h-3 ml-1 opacity-50"></i>
                    </div>
                </template>
            </div>
        </div>

        <!-- 右侧状态区 -->
        <div class="flex items-center gap-3 text-xs text-gray-400">
            <span x-show="bookmarkStatus === 'loading'" class="flex items-center">
                <i data-lucide="loader-2" class="w-3 h-3 animate-spin mr-1"></i> 加载中
            </span>
            <span x-show="bookmarkStatus === 'error'" class="text-red-400 flex items-center">
                <i data-lucide="alert-circle" class="w-3 h-3 mr-1"></i> 无书签文件
            </span>
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 p-[1px]">
                <img src="img/avatar.png" class="rounded-full w-full h-full bg-black object-cover">
            </div>
        </div>
    </header>

    <div class="flex h-screen overflow-hidden">
        
        <!-- 移动端菜单开关 -->
        <div class="lg:hidden fixed top-4 right-4 z-50">
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="acrylic p-2 rounded-lg text-white hover:bg-white/10 transition">
                <i :data-lucide="mobileMenuOpen ? 'x' : 'menu'"></i>
            </button>
        </div>

        <!-- 左侧边栏 -->
        <aside :class="mobileMenuOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
            class="fixed lg:static inset-y-0 left-0 z-40 w-72 acrylic border-r-0 lg:border-r border-white/10 flex flex-col transition-transform duration-300">
            
            <!-- 用户信息 -->
            <div class="p-8 flex flex-col items-center border-b border-white/5">
                <div class="w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-purple-500 to-blue-500 mb-4 shadow-lg">
                    <img src="img/avatar.png" alt="Avatar" class="w-full h-full rounded-full bg-slate-900 object-cover">
                </div>
                <h2 class="text-2xl font-bold text-white tracking-tight">zero-ljz</h2>
                <p class="text-sm text-gray-400 mt-1">全栈开发者</p>
                <div class="mt-4 flex items-center gap-2 text-xs px-3 py-1 rounded-full bg-white/5 border border-white/10">
                    <i data-lucide="map-pin" class="w-3 h-3 text-purple-400"></i>
                    <span>Changsha, CN</span>
                </div>
            </div>

            <!-- 导航菜单 -->
            <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2 custom-scrollbar">
                <template x-for="item in navItems" :key="item.name">
                    <a :href="item.link" 
                       :target="item.isExternal ? '_blank' : '_self'"
                       @click="selectTab(item.name)"
                       :class="currentTab === item.name ? 'bg-white/10 text-white border-white/10 shadow-[0_0_15px_rgba(255,255,255,0.05)]' : 'text-gray-300 hover:text-white hover:bg-white/5 border-transparent'"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group border">
                        <i :data-lucide="item.icon" :class="currentTab === item.name ? 'text-purple-400' : 'text-gray-400 group-hover:text-purple-400'" class="w-5 h-5 transition-colors"></i>
                        <span x-text="item.name" class="font-medium"></span>
                        <i x-show="item.isExternal" data-lucide="external-link" class="w-3 h-3 ml-auto opacity-50"></i>
                    </a>
                </template>
            </nav>

            <!-- 底部社交 -->
            <div class="p-6 border-t border-white/5 text-center">
                <a href="https://github.com/zero-ljz" target="_blank" class="inline-block text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="github" class="w-5 h-5"></i>
                </a>
                <p class="text-xs text-gray-600 mt-4">&copy; 2025 AI Dev.</p>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 h-full overflow-y-auto no-scrollbar relative scroll-smooth">
            <div class="max-w-7xl mx-auto p-6 lg:p-10 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-6 lg:grid-cols-12 gap-6">

                    <!-- Hero Section -->
                    <div id="about-section" class="col-span-1 md:col-span-6 lg:col-span-8 acrylic rounded-3xl p-8 flex flex-col justify-center relative overflow-hidden group">
                        <div class="absolute -top-16 -right-16 w-64 h-64 bg-purple-600/20 rounded-full blur-3xl transition-colors duration-700 group-hover:bg-purple-600/30"></div>
                        <h1 class="text-4xl lg:text-5xl font-bold text-white mb-4 relative z-10">你好, 我是 空心 👋</h1>
                        <p class="text-lg text-gray-300 mb-8 max-w-xl relative z-10 leading-relaxed">
                            热爱创造优雅的代码与直观的设计。专注于构建高性能 Web 应用与探索人工智能的前沿边界。
                        </p>
                        <div class="flex flex-wrap gap-4 relative z-10">
                            <a href="mailto:hi@iapp.run" class="px-6 py-2.5 rounded-xl bg-white text-black font-semibold hover:bg-gray-200 transition shadow-lg shadow-white/10">联系我</a>
                            <button onclick="window.open('https://github.com/zero-ljz', '_blank')" class="px-6 py-2.5 rounded-xl acrylic border border-white/20 hover:bg-white/10 transition">Github</button>
                        </div>
                    </div>

                    <!-- 时钟组件 -->
                    <div class="col-span-1 md:col-span-3 lg:col-span-4 acrylic rounded-3xl p-6 flex flex-col items-center justify-center" x-data="clockWidget">
                        <div class="relative w-40 h-40 rounded-full border-4 border-white/10 bg-black/20 backdrop-blur-sm mb-4 shadow-inner">
                            <template x-for="i in 12">
                                <div class="absolute inset-0" :style="`transform: rotate(${i * 30}deg)`">
                                    <div class="w-1 h-2 bg-white/30 mx-auto mt-1"></div>
                                </div>
                            </template>
                            <!-- 指针 -->
                            <div class="absolute top-1/2 left-1/2 w-1.5 h-10 bg-white rounded-full origin-bottom -translate-x-1/2 -translate-y-full" :style="`transform: translate(-50%, -100%) rotate(${h}deg)`"></div>
                            <div class="absolute top-1/2 left-1/2 w-1 h-14 bg-gray-300 rounded-full origin-bottom -translate-x-1/2 -translate-y-full" :style="`transform: translate(-50%, -100%) rotate(${m}deg)`"></div>
                            <div class="absolute top-1/2 left-1/2 w-0.5 h-16 bg-purple-500 rounded-full origin-bottom -translate-x-1/2 -translate-y-full" :style="`transform: translate(-50%, -100%) rotate(${s}deg)`"></div>
                            <div class="absolute top-1/2 left-1/2 w-3 h-3 bg-purple-500 rounded-full -translate-x-1/2 -translate-y-1/2 shadow-lg border-2 border-white/20"></div>
                        </div>
                        <div class="text-center">
                            <p class="text-3xl font-bold text-white font-mono tracking-wider" x-text="timeString"></p>
                            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest" x-text="dateString"></p>
                        </div>
                    </div>

                    <!-- 技术栈 -->
                    <div class="col-span-1 md:col-span-3 lg:col-span-4 acrylic rounded-3xl p-6">
                        <div class="flex items-center mb-4 gap-2">
                            <i data-lucide="cpu" class="text-purple-400 w-5 h-5"></i>
                            <h3 class="text-lg font-semibold text-white">技术栈</h3>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="tech in techStack" :key="tech">
                                <span class="px-3 py-1.5 rounded-lg text-xs font-medium bg-white/5 border border-white/10 hover:bg-white/10 hover:border-purple-500/50 transition cursor-default" x-text="tech"></span>
                            </template>
                        </div>
                    </div>

                    <!-- 项目列表 -->
                    <div id="projects-section" class="col-span-1 md:col-span-6 lg:col-span-8 acrylic rounded-3xl p-6">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center gap-2">
                                <i data-lucide="folder-git-2" class="text-blue-400 w-5 h-5"></i>
                                <h3 class="text-lg font-semibold text-white">精选项目</h3>
                            </div>
                            <a href="https://github.com/zero-ljz/" target="_blank" class="text-xs text-gray-400 hover:text-white transition">查看全部</a>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <template x-for="project in projects" :key="project.title">
                                <a :href="project.link" target="_blank" class="block p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition group">
                                    <div class="flex justify-between items-start mb-2">
                                        <div class="p-2 rounded-lg" :class="project.colorBg">
                                            <i :data-lucide="project.icon" class="w-5 h-5 text-white"></i>
                                        </div>
                                        <i data-lucide="arrow-up-right" class="w-4 h-4 text-gray-500 group-hover:text-white transition"></i>
                                    </div>
                                    <h4 class="text-base font-bold text-white mb-1" x-text="project.title"></h4>
                                    <p class="text-xs text-gray-400 line-clamp-2" x-text="project.desc"></p>
                                </a>
                            </template>
                        </div>
                    </div>

                    <!-- 近期计划 -->
                    <div class="col-span-1 md:col-span-3 lg:col-span-4 acrylic rounded-3xl p-6 flex flex-col">
                        <div class="flex items-center mb-4 gap-2">
                            <i data-lucide="list-todo" class="text-green-400 w-5 h-5"></i>
                            <h3 class="text-lg font-semibold text-white">近期计划</h3>
                        </div>
                        <div class="space-y-3 flex-1">
                            <template x-for="plan in plans" :key="plan.text">
                                <div class="flex items-start gap-3 p-2 rounded-lg hover:bg-white/5 transition">
                                    <div class="mt-1 w-4 h-4 rounded border flex items-center justify-center transition-colors"
                                         :class="plan.done ? 'bg-green-500 border-green-500' : 'border-gray-500'">
                                        <i x-show="plan.done" data-lucide="check" class="w-3 h-3 text-white"></i>
                                    </div>
                                    <span class="text-sm" :class="plan.done ? 'text-gray-500 line-through' : 'text-gray-300'" x-text="plan.text"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- 文章列表 -->
                    <div id="posts-section" class="col-span-1 md:col-span-4 lg:col-span-5 acrylic rounded-3xl p-6 flex flex-col h-[450px]">
                        <div class="flex items-center justify-between mb-4 shrink-0">
                            <div class="flex items-center gap-2">
                                <i data-lucide="pen-tool" class="text-orange-400 w-5 h-5"></i>
                                <h3 class="text-lg font-semibold text-white">最近文章</h3>
                            </div>
                            <span x-show="posts.length" class="text-xs text-gray-400 bg-white/10 px-2 py-1 rounded-full" x-text="`${posts.length} 篇`"></span>
                        </div>

                        <div class="space-y-2 overflow-y-auto custom-scrollbar pr-2 flex-1">
                            <div x-show="loading" class="flex justify-center py-8">
                                <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div>
                            </div>
                            
                            <template x-for="article in posts" :key="article.file">
                                <a href="#" @click.prevent="openArticle(article)" 
                                   class="block p-3 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/5 transition group">
                                    <div class="flex justify-between items-start mb-1">
                                        <span class="text-sm font-medium text-gray-200 group-hover:text-white truncate" x-text="article.title"></span>
                                        <span class="text-[10px] text-gray-500 shrink-0 mt-0.5" x-text="article.date"></span>
                                    </div>
                                    <div class="flex items-center gap-1 text-xs text-gray-500">
                                        <i data-lucide="file-text" class="w-3 h-3"></i>
                                        <span>Markdown</span>
                                    </div>
                                </a>
                            </template>
                        </div>
                    </div>

                    <!-- 相册墙 -->
                    <div id="photos-section" x-data="photoGallery" class="col-span-1 md:col-span-6 lg:col-span-12 acrylic rounded-3xl p-6 relative">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-2">
                                <i data-lucide="camera" class="text-pink-400 w-6 h-6"></i>
                                <h3 class="text-xl font-semibold text-white">光影集</h3>
                                <span x-show="!loading && allImages.length" class="text-xs text-gray-400 bg-white/10 px-2 py-1 rounded-full">
                                    <span x-text="displayedImages.length"></span> / <span x-text="allImages.length"></span>
                                </span>
                            </div>
                            <button @click="resetGallery" class="p-2 hover:bg-white/10 rounded-full transition text-gray-400 hover:text-white" title="刷新">
                                <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                            </button>
                        </div>

                        <div x-show="loading" class="flex justify-center py-10">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-pink-500"></div>
                        </div>

                        <div x-show="!loading" class="columns-2 md:columns-4 gap-4 space-y-4">
                            <template x-for="img in displayedImages" :key="img.path">
                                <div class="break-inside-avoid relative group rounded-xl overflow-hidden cursor-zoom-in border border-white/5 bg-black/20"
                                     @click="openLightbox(img.path)">
                                    <img :src="img.path" loading="lazy" class="w-full h-auto transition-transform duration-500 group-hover:scale-110">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4 pointer-events-none">
                                        <div class="flex items-center gap-1 text-white/90 text-xs font-medium mb-1">
                                            <i data-lucide="image" class="w-3 h-3"></i>
                                            <span x-text="img.name"></span>
                                        </div>
                                        <div class="flex items-center gap-1 text-gray-400 text-[10px]">
                                            <i data-lucide="clock" class="w-3 h-3"></i>
                                            <span x-text="img.date"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div x-show="!loading && allImages.length === 0" class="text-center py-10 text-gray-500">暂无照片</div>

                        <div x-show="hasMore && !loading" class="flex justify-center mt-8">
                            <button @click="loadMore" class="px-6 py-2 rounded-full bg-white/10 hover:bg-white/20 text-white text-sm transition flex items-center gap-2 border border-white/5">
                                <span>加载更多</span>
                                <i data-lucide="chevron-down" class="w-4 h-4"></i>
                            </button>
                        </div>

                        <!-- Lightbox -->
                        <div x-show="lightboxOpen" 
                             x-transition.opacity.duration.300ms
                             @keydown.escape.window="lightboxOpen = false"
                             class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-md flex items-center justify-center p-4" style="display: none;">
                            <button @click="lightboxOpen = false" class="absolute top-6 right-6 text-white/50 hover:text-white transition z-50">
                                <i data-lucide="x" class="w-8 h-8"></i>
                            </button>
                            <img :src="currentImage" @click.outside="lightboxOpen = false" class="max-w-full max-h-full rounded shadow-2xl">
                        </div>
                    </div>

                    <!-- 友链 -->
                    <div class="col-span-1 md:col-span-5 lg:col-span-7 acrylic rounded-3xl p-6">
                        <div class="flex items-center mb-4 gap-2">
                            <i data-lucide="link" class="text-pink-400 w-5 h-5"></i>
                            <h3 class="text-lg font-semibold text-white">友链</h3>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                            <template x-for="friend in friends" :key="friend.name">
                                <a :href="friend.url" class="flex items-center gap-2 p-2 rounded-xl bg-white/5 hover:bg-white/10 transition border border-transparent hover:border-white/10">
                                    <img :src="friend.avatar" class="w-8 h-8 rounded-full bg-slate-800" alt="Avatar">
                                    <span class="text-xs font-medium text-gray-300 truncate" x-text="friend.name"></span>
                                </a>
                            </template>
                        </div>
                    </div>

                </div>
                
                <!-- 页脚 -->
                <footer class="text-center text-gray-500 text-sm py-8">
                    Built with TailwindCSS & Alpine.js
                </footer>
            </div>
        </main>
    </div>

    <!-- 文章阅读 Modal -->
    <div x-show="readingMode" 
         x-transition.opacity
         class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4"
         style="display: none;">
        <div class="acrylic rounded-2xl w-full max-w-4xl h-[85vh] relative shadow-2xl border border-white/10 flex flex-col" @click.away="closeArticle">
            <div class="flex items-center justify-between p-4 border-b border-white/10">
                <span class="text-white font-semibold">阅读文章</span>
                <button @click="closeArticle" class="text-gray-400 hover:text-red-400 transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div x-ref="mdContent" class="prose prose-invert prose-lg max-w-none prose-a:text-blue-400 prose-img:rounded-xl prose-pre:bg-slate-900">
                    <div class="flex justify-center h-40 items-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 逻辑脚本 -->
    <script>
        // 静态配置数据
        const CONFIG = {
            navItems: [
                { name: '首页', icon: 'home', link: '#', isExternal: false },
                { name: '关于', icon: 'user', link: '#about-section', isExternal: false },
                { name: '项目', icon: 'layers', link: '#projects-section', isExternal: false },
                { name: '文章', icon: 'file-text', link: '#posts-section', isExternal: false },
                { name: '相册', icon: 'camera', link: '#photos-section', isExternal: false },
                { name: '联系', icon: 'mail', link: 'mailto:hi@iapp.run', isExternal: true }
            ],
            techStack: ['Python', 'FastAPI', 'PySide6', 'PostgreSQL', 'MkDocs', 'TypeScript', 'Vite', 'React', 'React Native', 'shadcn/ui', 'Tailwind CSS', 'Lucide', 'Axios', 'VitePress'],
            projects: [
                { title: '全局工具箱(油猴脚本)', desc: '全能网页工具箱：翻译、搜索、去除限制、提取图片、夜间模式等。支持悬浮球拖拽与现代化UI', icon: 'wrench', colorBg: 'bg-purple-500/20', link: 'https://greasyfork.org/zh-CN/scripts/469339-全局工具箱' },
                { title: 'scripts', desc: '常用脚本合集', icon: 'shopping-bag', colorBg: 'bg-blue-500/20', link: 'https://github.com/zero-ljz/scripts' },
                { title: 'SysTools', desc: '系统工具集与 Web Shell', icon: 'check-square', colorBg: 'bg-green-500/20', link: 'https://github.com/zero-ljz/systools' },
            ],
            plans: [
                { text: '学习 Javascript 语言基础', done: true },
                { text: '发布新的开源组件库', done: false },
            ],
            friends: [
                { name: 'Evan You', url: '#', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Evan' },
            ]
        };

        document.addEventListener('alpine:init', () => {
            // 主应用逻辑
            Alpine.data('mainApp', () => ({
                mobileMenuOpen: false,
                currentTab: '首页',
                navItems: CONFIG.navItems,
                techStack: CONFIG.techStack,
                projects: CONFIG.projects,
                plans: CONFIG.plans,
                friends: CONFIG.friends,
                
                // 文章相关
                posts: [],
                loading: true,
                readingMode: false,


                // 菜单相关
                menuData: [
                    {
                        label: 'Start',
                        icon: 'command',
                        children: [
                            { label: 'Dashboard', icon: 'layout-dashboard', action: '#' },
                            { type: 'separator' },
                            { label: 'Reload App', icon: 'refresh-cw', action: 'javascript:location.reload()' },
                        ]
                    }
                    // 书签将插入到这里
                ],
                bookmarkStatus: 'loading',
                init() {
                    this.checkHash();
                    window.addEventListener('hashchange', () => this.checkHash());
                    this.fetchPosts();
                    this.$nextTick(() => lucide.createIcons());

                    this.loadBookmarks();
                    // 初始图标渲染
                    this.$nextTick(() => lucide.createIcons());
                },

                checkHash() {
                    const hash = window.location.hash;
                    const item = this.navItems.find(i => i.link === hash);
                    if (item) this.currentTab = item.name;
                    else if (!hash) this.currentTab = '首页';
                },

                selectTab(name) {
                    this.currentTab = name;
                    this.mobileMenuOpen = false;
                },

                async fetchPosts() {
                    try {
                        const res = await fetch('./posts/index.json');
                        if (!res.ok) throw new Error("Posts not found");
                        const data = await res.json();
                        this.posts = data.map(i => ({
                            title: i.name.replace(/\.md$/i, ''),
                            file: i.path,
                            date: i.date?.split(' ')[0] || ''
                        }));
                    } catch (e) {
                        console.warn("文章加载失败:", e);
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                async openArticle(article) {
                    this.readingMode = true;
                    this.$refs.mdContent.innerHTML = '<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div></div>';
                    try {
                        const res = await fetch(article.file);
                        const text = await res.text();
                        this.$refs.mdContent.innerHTML = marked.parse(text);
                    } catch (e) {
                        this.$refs.mdContent.innerHTML = '<p class="text-red-400 text-center">文章内容加载失败</p>';
                    }
                },

                closeArticle() {
                    this.readingMode = false;
                },


                async loadBookmarks() {
                    try {
                        const response = await fetch('./data/bookmarks.json');
                        if (!response.ok) throw new Error('File not found');
                        
                        const data = await response.json();
                        
                        if (data.roots && data.roots.bookmark_bar) {
                            const bookmarkTree = this.transformBookmarks(data.roots.bookmark_bar.children);
                            
                            const bookmarkMenu = {
                                label: '书签栏 (Bookmarks Bar)',
                                icon: 'bookmark',
                                children: bookmarkTree
                            };

                            // 插入到菜单列表
                            this.menuData.push(bookmarkMenu);
                            this.bookmarkStatus = 'success';
                        }

                    } catch (error) {
                        console.warn('Bookmarks error:', error);
                        this.bookmarkStatus = 'error';
                        this.menuData.push({
                            label: 'Import Bookmarks',
                            icon: 'import',
                            children: [
                                { label: 'Place bookmarks.json in root', icon: 'file-warning' },
                                { label: 'Retry', icon: 'refresh-ccw', action: 'javascript:location.reload()' }
                            ]
                        });
                    } finally {
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // 递归转换 + 获取 Favicon
                transformBookmarks(nodes) {
                    if (!nodes || nodes.length === 0) return [];

                    return nodes.map(node => {
                        if (node.type === 'folder') {
                            return {
                                label: node.name,
                                icon: 'folder',
                                children: this.transformBookmarks(node.children)
                            };
                        } else if (node.type === 'url') {
                            // 尝试提取域名以获取图标
                            let iconUrl = null;
                            try {
                                const urlObj = new URL(node.url);
                                // 使用 Google Favicon API (sz=32 用于高清屏)
                                iconUrl = `https://p.520999.xyz/https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=32`;
                            } catch (e) {
                                // URL 无效时忽略
                            }

                            return {
                                label: node.name,
                                action: node.url,
                                iconUrl: iconUrl, // 传递图标 URL
                                icon: 'globe' // 备用图标
                            };
                        }
                        return null;
                    }).filter(i => i !== null);
                },

                handleTopMenuHover(event, item) {
                    menuSys.closeAll();
                    if (item.children) {
                        const rect = event.currentTarget.getBoundingClientRect();
                        menuSys.show(item.children, rect.left, rect.bottom + 2);
                    }
                },

                handleMenuClick(item) {
                    if (!item.children) {
                        menuSys.closeAll();
                        menuSys.executeAction(item);
                    }
                },

                openContextMenu(event) {
                    menuSys.closeAll();
                    menuSys.show(this.menuData, event.clientX, event.clientY, null);
                },

                closeContextMenu() {
                    menuSys.closeAll();
                }
            }));

            // 时钟组件
            Alpine.data('clockWidget', () => ({
                h: 0, m: 0, s: 0, 
                timeString: '', dateString: '',
                timer: null,
                init() {
                    const update = () => {
                        const now = new Date();
                        const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
                        this.s = s * 6;
                        this.m = m * 6 + s * 0.1;
                        this.h = (h % 12) * 30 + m * 0.5;
                        this.timeString = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
                        this.dateString = now.toLocaleDateString('zh-CN', { weekday: 'long', month: 'short', day: 'numeric' });
                    };
                    update();
                    this.timer = setInterval(update, 1000);
                },
                destroy() {
                    clearInterval(this.timer);
                }
            }));

            // 相册组件
            Alpine.data('photoGallery', () => ({
                allImages: [],
                displayedImages: [],
                loading: true,
                lightboxOpen: false,
                currentImage: '',
                pageSize: 8,
                currentPage: 1,
                hasMore: false,

                async init() {
                    await this.fetchImages();
                },

                async fetchImages() {
                    try {
                        const res = await fetch('./photos/index.json');
                        if (!res.ok) throw new Error('Photos error');
                        this.allImages = await res.json();
                        this.loadMore();
                    } catch (e) {
                        console.error(e);
                    } finally {
                        this.loading = false;
                    }
                },

                loadMore() {
                    const start = (this.currentPage - 1) * this.pageSize;
                    const end = this.currentPage * this.pageSize;
                    this.displayedImages.push(...this.allImages.slice(start, end));
                    this.currentPage++;
                    this.hasMore = this.displayedImages.length < this.allImages.length;
                    this.$nextTick(() => lucide.createIcons());
                },

                resetGallery() {
                    this.currentPage = 1;
                    this.displayedImages = [];
                    this.loading = true;
                    this.fetchImages();
                },

                openLightbox(url) {
                    this.currentImage = url;
                    this.lightboxOpen = true;
                }
            }));
        });




        // ================= 菜单系统核心逻辑 =================
        class MenuSystem {
            constructor() {
                this.activeMenus = []; 
            }

            /**
             * 显示菜单
             * @param {Array} items 菜单数据
             * @param {number} x 目标X坐标
             * @param {number} y 目标Y坐标
             * @param {HTMLElement} parentEl 父级DOM (用于定位和层级管理)
             */
            show(items, x, y, parentEl = null) {
                // 1. 创建容器
                const menuEl = document.createElement('div');
                // 添加 custom-scrollbar 类以美化内部滚动条
                menuEl.className = `acrylic dynamic-menu-container custom-scrollbar animate-fade-in`;
                menuEl.style.visibility = 'hidden'; // 先隐藏以计算尺寸
                document.body.appendChild(menuEl);

                // 2. 填充数据
                items.forEach(item => {
                    if (item.type === 'separator') {
                        const sep = document.createElement('div');
                        sep.className = 'h-[1px] bg-white/10 my-1 mx-2 shrink-0';
                        menuEl.appendChild(sep);
                        return;
                    }

                    const row = document.createElement('div');
                    row.className = `
                        relative flex items-center justify-between px-3 py-2 rounded-md shrink-0
                        cursor-pointer transition-colors text-sm text-gray-200 hover:text-white hover:bg-white/10
                        ${item.children ? 'group' : ''}
                    `;
                    
                    // === 左侧内容 (图标 + 文本) ===
                    const leftContent = document.createElement('div');
                    leftContent.className = 'flex items-center gap-3 overflow-hidden w-full';
                    
                    // 图标渲染逻辑
                    let iconHtml = '';
                    if (item.iconUrl) {
                        // 优先显示 Favicon 图片
                        iconHtml = `<img src="${item.iconUrl}" class="w-4 h-4 shrink-0 rounded-sm bg-white/10" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                                    <i data-lucide="globe" class="w-4 h-4 opacity-50 shrink-0 hidden"></i>`;
                    } else if (item.checked !== undefined) {
                        iconHtml = item.checked 
                            ? `<i data-lucide="check" class="w-4 h-4 text-purple-400 shrink-0"></i>` 
                            : `<div class="w-4 h-4 shrink-0"></div>`;
                    } else if (item.icon) {
                        iconHtml = `<i data-lucide="${item.icon}" class="w-4 h-4 opacity-70 shrink-0"></i>`;
                    } else {
                        // 默认文件夹图标
                        const defaultIcon = item.children ? 'folder' : 'file';
                        iconHtml = `<i data-lucide="${defaultIcon}" class="w-4 h-4 opacity-50 shrink-0"></i>`;
                    }
                    
                    leftContent.innerHTML = `${iconHtml}<span class="truncate pr-2">${item.label}</span>`;
                    row.appendChild(leftContent);

                    // === 右侧内容 (箭头 或 快捷键) ===
                    if (item.children) {
                        row.innerHTML += `<i data-lucide="chevron-right" class="w-3 h-3 opacity-50 shrink-0"></i>`;
                    } else if (item.shortcut) {
                        row.innerHTML += `<span class="text-xs text-gray-500 ml-2 shrink-0 font-mono">${item.shortcut}</span>`;
                    }

                    // 事件绑定
                    row.addEventListener('mouseenter', () => this.handleItemHover(row, item, menuEl));
                    row.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (item.children) return; // 有子项时不关闭
                        this.executeAction(item);
                        this.closeAll(); 
                    });

                    menuEl.appendChild(row);
                });

                // 刷新图标
                lucide.createIcons({ root: menuEl });

                // 3. 智能定位计算 (Smart Positioning)
                const rect = menuEl.getBoundingClientRect();
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                const padding = 10; // 屏幕边缘安全距离

                let finalX = x;
                let finalY = y;

                // --- Y轴处理 (防底部溢出 + 防顶部溢出) ---
                if (y + rect.height > winH - padding) {
                    // 如果底部放不下，尝试向上放
                    if (parentEl) {
                        // 子菜单：底部对齐父项底部
                        const parentRect = parentEl.getBoundingClientRect();
                        finalY = parentRect.bottom - rect.height;
                    } else {
                        // 根菜单：直接向上平移
                        finalY = y - rect.height;
                    }
                    
                    // 二次检查：如果向上放导致顶部溢出 (finalY < 0)，则强制吸附顶部并启用滚动
                    if (finalY < padding) {
                        finalY = padding;
                        // 因为我们在 CSS 中设置了 max-height: calc(100vh - 20px) 和 overflow-y: auto
                        // 所以只要 top >= padding，内容就一定能通过滚动看到
                    }
                } else {
                    // 简单的向下微调，如果是子菜单且没溢出，稍微对其
                    if (!parentEl) finalY += 2;
                }

                // --- X轴处理 (防右溢出 + 防左溢出) ---
                // 默认逻辑是向右展开。检查是否超出右边界
                if (x + rect.width > winW - padding) {
                    // 超出右边 -> 向左翻转
                    if (parentEl) {
                        const parentRect = parentEl.getBoundingClientRect();
                        finalX = parentRect.left - rect.width + 4; // +4 为了视觉上的微重叠
                    } else {
                        finalX = x - rect.width;
                    }
                }

                // 二次检查：翻转后是否超出左边界 (finalX < 0) ?
                // 这种情况通常发生在屏幕很窄，或者多级菜单向左套娃时
                if (finalX < padding) {
                    finalX = padding; // 强制靠左显示，覆盖在父菜单上也没办法，总比看不见好
                }

                menuEl.style.left = `${finalX}px`;
                menuEl.style.top = `${finalY}px`;
                menuEl.style.visibility = 'visible';

                this.activeMenus.push(menuEl);
            }

            handleItemHover(rowEl, item, currentMenuEl) {
                // 关闭当前层级之后的所有菜单
                const currentIndex = this.activeMenus.indexOf(currentMenuEl);
                if (currentIndex !== -1) {
                    this.closeFromIndex(currentIndex + 1);
                }

                if (item.children && item.children.length > 0) {
                    const rect = rowEl.getBoundingClientRect();
                    // 默认在右侧展开
                    this.show(item.children, rect.right - 4, rect.top - 4, rowEl);
                }
            }

            executeAction(item) {
                if (item.action) {
                    if (typeof item.action === 'string' && item.action.startsWith('http')) {
                        window.open(item.action, '_blank');
                    } else {
                        console.log('Command:', item.action);
                        eval(item.action)
                    }
                }
            }

            closeAll() {
                this.activeMenus.forEach(el => el.remove());
                this.activeMenus = [];
            }

            closeFromIndex(index) {
                while (this.activeMenus.length > index) {
                    const el = this.activeMenus.pop();
                    el.remove();
                }
            }
        }

        const menuSys = new MenuSystem();




    </script>





<script>
    (function() {
        // -------------------------------------------------------
        // 配置区域：在这里填入你喜欢的 API 地址
        // -------------------------------------------------------
        
        // 选项1: Lorem Picsum (风景/生活/随机，非常稳定)
        const wallpaperApi = 'https://www.dmoe.cc/random.php'; 

        // -------------------------------------------------------
        // 代码逻辑
        // -------------------------------------------------------
        function setBackground() {
            // 获取当前时间戳，用于防止浏览器缓存旧图片
            const timestamp = new Date().getTime();
            
            // 判断 API 链接中是否已经包含了 '?'
            const symbol = wallpaperApi.includes('?') ? '&' : '?';
            
            // 拼接最终 URL (例如: ...api.php?t=123456)
            const finalUrl = `${wallpaperApi}${symbol}t=${timestamp}`;

            // 创建一个新的 Image 对象来预加载图片，防止页面闪烁
            const img = new Image();
            img.src = finalUrl;
            
            img.onload = function() {
                // 图片加载完成后，设置为 body 背景
                // 解释：rgba(0, 0, 0, 0.5) 中的 0.5 代表透明度（0是全透，1是全黑），你可以把 0.5 改成 0.3（亮一点）或 0.7（暗一点）
                document.body.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('${finalUrl}')`;
            };
        }

        // 页面加载时执行
        window.onload = setBackground;
    })();
</script>

  <script>
    const fetchPlayerList = async () => {
      try {
        const response = await fetch(
          "https://api.rainss.cn/x-player/api/palyerlist.php?id=725994751"
        );
        const data = await response.json();
        const ap = new APlayer({ // https://aplayer.js.org/#/zh-Hans/?id=入门
          container: document.getElementById("player"),
          fixed: true,
          lrcType: 3,
          autoplay: false,
          theme: "#b7daff",
          audio: data.songs,
          order: 'random', // 音频循环播放, 可选值: 'all', 'one', 'none'
          loop: 'all', // 音频循环顺序, 可选值: 'list', 'random'
        });

        const colorThief = new ColorThief();
        const image = new Image();
        const setTheme = async (index) => {
          if (!ap.list.audios[index].theme) {
            const response = await fetch(ap.list.audios[index].cover);
            const blob = await response.blob();
            const coverUrl = URL.createObjectURL(blob);
            image.onload = function () {
              const color = colorThief.getColor(image);
              ap.theme(`rgb(${color[0]}, ${color[1]}, ${color[2]})`, index);
              // console.log(
              //   "theme => " + `rgb(${color[0]}, ${color[1]}, ${color[2]})`
              // );
              URL.revokeObjectURL(coverUrl);
            };
            image.src = coverUrl;
          }
        };

        setTheme(ap.list.index);
        ap.on("listswitch", (index) => {
          setTheme(index.index);
        });
      } catch (error) {
        console.log("Error:", error);
      }
    };

    fetchPlayerList();

  </script>
